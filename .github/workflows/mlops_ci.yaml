name: MLOps CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Cache Pip Dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Code Linting (Black & Flake8)
      run: |
        black --check src/ tests/
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --max-line-length=127 --statistics

    - name: Download Dataset
      run: |
        python src/download_data.py

    - name: Run Unit Tests
      run: |
        pytest tests/ --cov=src --cov-report=term-missing

    - name: Validate Training Pipeline
      run: |
        python src/train.py --model lr --save-path models/test_model.joblib

    - name: Validate Docker Image Build
      run: |
        docker build -t heart-disease-api:test .
